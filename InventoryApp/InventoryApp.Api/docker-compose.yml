services:
  api:
    image: ${DOCKER_IMAGE}          
    container_name: inventoryapp_api
    restart: unless-stopped
    ports:
      - "8080:8080"
      
    env_file:
      - .env

    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080

    depends_on:
      sqlserver:
        condition: service_healthy   
    networks:
      - inventoryapp_net

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: inventoryapp_sqlserver
    restart: unless-stopped
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${SA_PASSWORD}
      - MSSQL_PID=Express              
    ports:
      - "1433:1433"                    
    volumes:
      - sqlserver_data:/var/opt/mssql 
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P '${SA_PASSWORD}' -Q 'SELECT 1' -C -b"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s              
    networks:
      - inventoryapp_net

volumes:
  sqlserver_data:
    driver: local

networks:
  inventoryapp_net:
    driver: bridge